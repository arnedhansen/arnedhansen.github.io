  <script>
(function () {
  "use strict";

  const DATA_BASE = "resources/AOC/data/";
  const VIZ_ORDER = ["erp", "spectrum", "tfr", "topo", "gaze_deviation", "spl", "gaze_velocity", "bcea", "behavior"];
  const VIZ_WITH_PARAM = ["spectrum", "tfr", "topo"];
  const EEG_VIZ = ["erp", "spectrum", "tfr", "topo"];
  const PROC_ORDER = ["raw", "baselined", "parameterized"];
  const PROC_LABELS = { raw: "Raw", baselined: "Baselined", parameterized: "Baselined + SpecParam" };
  const TASK_LABELS = { nback: "N-back", sternberg: "Sternberg" };
  const COND_COLORS = {
    "1back": "#ADD8E6",
    "2back": "#99CC99",
    "3back": "#FFB3BF",
    "2items": "#ADD8E6",
    "4items": "#99CC99",
    "6items": "#FFB3BF"
  };
  const COND_LABELS = {
    "1back": "1-back",
    "2back": "2-back",
    "3back": "3-back",
    "2items": "WM load 2",
    "4items": "WM load 4",
    "6items": "WM load 6"
  };

  let state = { viz: new Set(["spectrum"]), proc: new Set(["raw"]), task: new Set(["nback", "sternberg"]) };
  let dataCache = new Map();
  let renderAbortController = null;
  let availableFiles = null;

  function filename(viz, proc, task) {
    if (viz === "behavior") return task + "_behavior_raw.json";
    if (viz === "erp") return task + "_erp_" + proc + ".json";
    if (["gaze_deviation", "spl", "gaze_velocity", "bcea"].includes(viz)) return task + "_" + viz + "_" + proc + ".json";
    return task + "_" + viz + "_" + proc + ".json";
  }

  function comboHasFile(viz, proc, task) {
    if (!availableFiles) return true;
    const fn = filename(viz, proc, task);
    return availableFiles.has(fn);
  }

  function vizHasAnyData(viz) {
    const tasks = [...state.task];
    const procs = viz === "behavior" ? ["raw"] : PROC_ORDER.filter(p => state.proc.has(p));
    for (const t of tasks) {
      for (const p of procs) {
        if (comboHasFile(viz, p, t)) return true;
      }
    }
    return false;
  }

  function updateVizAvailability() {
    document.querySelectorAll("#viz-pills .aoc-pill").forEach(p => {
      const has = vizHasAnyData(p.dataset.viz);
      p.disabled = !has;
      p.classList.toggle("disabled", !has);
      if (!has && state.viz.has(p.dataset.viz)) state.viz.delete(p.dataset.viz);
    });
    if (state.viz.size === 0) {
      for (const v of VIZ_ORDER) {
        if (vizHasAnyData(v)) {
          state.viz.add(v);
          break;
        }
      }
    }
  }

  async function loadData(viz, proc, task, signal) {
    const f = filename(viz, proc, task);
    if (dataCache.has(f)) return dataCache.get(f);
    try {
      const r = await fetch(DATA_BASE + f, { signal: signal });
      if (!r.ok) throw new Error("Not found");
      const data = await r.json();
      dataCache.set(f, data);
      return data;
    } catch (e) {
      if (e && e.name === "AbortError") throw e;
      return null;
    }
  }

  function syncPillClasses() {
    document.querySelectorAll("#viz-pills .aoc-pill").forEach(x => x.classList.toggle("active", state.viz.has(x.dataset.viz)));
    document.querySelectorAll("#proc-pills .aoc-pill").forEach(x => x.classList.toggle("active", state.proc.has(x.dataset.proc)));
    document.querySelectorAll("#task-pills .aoc-pill").forEach(x => x.classList.toggle("active", state.task.has(x.dataset.task)));
  }

  function updateProcVisibility() {
    const hasParam = [...state.viz].some(v => VIZ_WITH_PARAM.includes(v));
    document.getElementById("proc-param").style.display = hasParam ? "" : "none";
    if (!hasParam) state.proc.delete("parameterized");
    if (state.proc.size === 0) state.proc.add("raw");
    syncPillClasses();
  }

  function getCondNames(task) {
    return task === "nback" ? ["1back", "2back", "3back"] : ["2items", "4items", "6items"];
  }

  function getCondLabel(cond) {
    return COND_LABELS[cond] || cond;
  }

  function quantile(sortedVals, q) {
    if (!sortedVals || sortedVals.length === 0) return NaN;
    if (sortedVals.length === 1) return sortedVals[0];
    const idx = (sortedVals.length - 1) * q;
    const lo = Math.floor(idx);
    const hi = Math.ceil(idx);
    if (lo === hi) return sortedVals[lo];
    const w = idx - lo;
    return sortedVals[lo] * (1 - w) + sortedVals[hi] * w;
  }

  function deterministicJitter(pointIdx, condIdx, spread) {
    const seed = Math.sin((pointIdx + 1) * 12.9898 + (condIdx + 1) * 78.233) * 43758.5453;
    return ((seed - Math.floor(seed)) - 0.5) * spread;
  }

  function drawYAxisTicksAndLabel(ctx, pad, plotH, vMin, vMax, label, decimals) {
    const tickCount = 4;
    const d = Number.isFinite(decimals) ? decimals : 2;
    ctx.fillStyle = "#6e6e73";
    ctx.font = "11px -apple-system, sans-serif";
    for (let i = 0; i <= tickCount; i++) {
      const val = vMax - ((vMax - vMin) * i) / tickCount;
      const y = pad.t + (plotH * i) / tickCount;
      ctx.strokeStyle = "#9ca3af";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.l, y);
      ctx.lineTo(pad.l - 5, y);
      ctx.stroke();
      ctx.textAlign = "right";
      ctx.fillText(val.toFixed(d), pad.l - 8, y + 3);
    }
    ctx.textAlign = "center";
    ctx.save();
    ctx.translate(16, pad.t + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }

  function drawSpectrum(ctx, width, height, data, task) {
    if (!data || !data.freqs || !data.conditions) return;
    const conds = getCondNames(task).filter(c => data.conditions[c]);
    if (conds.length === 0) return;
    const freqs = data.freqs;
    const pad = { t: 24, r: 18, b: 62, l: 62 };
    const plotW = width - pad.l - pad.r;
    const plotH = height - pad.t - pad.b;
    const fmin = 4, fmax = 20;
    let vMin = Infinity, vMax = -Infinity;
    conds.forEach(c => {
      const v = data.conditions[c];
      v.forEach(x => { vMin = Math.min(vMin, x); vMax = Math.max(vMax, x); });
      if (data.sem && data.sem[c]) data.sem[c].forEach((s, i) => { vMin = Math.min(vMin, v[i] - s); vMax = Math.max(vMax, v[i] + s); });
    });
    if (vMax <= vMin) vMax = vMin + 1;
    vMin -= (vMax - vMin) * 0.05;
    vMax += (vMax - vMin) * 0.05;

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, width, height);

    ctx.strokeStyle = "#c7c7cc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, pad.t);
    ctx.lineTo(pad.l, height - pad.b);
    ctx.lineTo(width - pad.r, height - pad.b);
    ctx.stroke();

    if (data.iaf) {
      const iafx = pad.l + ((data.iaf - fmin) / (fmax - fmin)) * plotW;
      if (iafx >= pad.l && iafx <= width - pad.r) {
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.moveTo(iafx, pad.t);
        ctx.lineTo(iafx, height - pad.b);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    conds.forEach((c, i) => {
      const vals = data.conditions[c];
      const sems = data.sem && data.sem[c] ? data.sem[c] : null;
      const pts = freqs.map((f, j) => ({
        x: pad.l + ((f - fmin) / (fmax - fmin)) * plotW,
        y: pad.t + plotH - ((vals[j] - vMin) / (vMax - vMin)) * plotH
      }));
      if (sems) {
        ctx.fillStyle = (COND_COLORS[c] || "#333") + "26";
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          const yy = pad.t + plotH - ((vals[j] + sems[j] - vMin) / (vMax - vMin)) * plotH;
          if (j === 0) ctx.moveTo(pts[j].x, yy);
          else ctx.lineTo(pts[j].x, yy);
        }
        for (let j = pts.length - 1; j >= 0; j--) {
          const yy = pad.t + plotH - ((vals[j] - sems[j] - vMin) / (vMax - vMin)) * plotH;
          ctx.lineTo(pts[j].x, yy);
        }
        ctx.closePath();
        ctx.fill();
      }
      ctx.strokeStyle = COND_COLORS[c] || "#333";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let j = 1; j < pts.length; j++) ctx.lineTo(pts[j].x, pts[j].y);
      ctx.stroke();
    });

    ctx.fillStyle = "#6e6e73";
    ctx.font = "11px -apple-system, sans-serif";
    ctx.textAlign = "center";
    for (let f = 4; f <= 20; f += 2) {
      const x = pad.l + ((f - fmin) / (fmax - fmin)) * plotW;
      ctx.fillText(String(f), x, height - pad.b + 18);
    }
    drawYAxisTicksAndLabel(ctx, pad, plotH, vMin, vMax, "Power (a.u.)", 2);
    ctx.textAlign = "center";
    ctx.fillText("Frequency (Hz)", pad.l + plotW / 2, height - 12);
  }

  function drawERP(ctx, width, height, data, task) {
    if (!data || !data.times || !data.conditions) return;
    const conds = getCondNames(task).filter(c => data.conditions[c]);
    if (conds.length === 0) return;
    const times = data.times;
    const pad = { t: 24, r: 18, b: 62, l: 62 };
    const plotW = width - pad.l - pad.r;
    const plotH = height - pad.t - pad.b;
    const tMin = Math.min(...times), tMax = Math.max(...times);
    let vMin = Infinity, vMax = -Infinity;
    conds.forEach(c => {
      data.conditions[c].forEach(x => { vMin = Math.min(vMin, x); vMax = Math.max(vMax, x); });
    });
    if (vMax <= vMin) vMax = vMin + 1;
    vMin -= (vMax - vMin) * 0.05;
    vMax += (vMax - vMin) * 0.05;

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, width, height);

    ctx.strokeStyle = "#c7c7cc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, pad.t);
    ctx.lineTo(pad.l, height - pad.b);
    ctx.lineTo(width - pad.r, height - pad.b);
    ctx.stroke();
    const t0x = pad.l + ((0 - tMin) / (tMax - tMin)) * plotW;
    if (t0x >= pad.l && t0x <= width - pad.r) {
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = "rgba(0,0,0,0.4)";
      ctx.beginPath();
      ctx.moveTo(t0x, pad.t);
      ctx.lineTo(t0x, height - pad.b);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#6e6e73";
      ctx.font = "10px -apple-system, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Stimulus", t0x, pad.t - 8);
    }

    conds.forEach((c, i) => {
      const vals = data.conditions[c];
      const sems = data.sem && data.sem[c] ? data.sem[c] : null;
      const pts = times.map((t, j) => ({
        x: pad.l + ((t - tMin) / (tMax - tMin)) * plotW,
        y: pad.t + plotH - ((vals[j] - vMin) / (vMax - vMin)) * plotH
      }));
      if (sems) {
        ctx.fillStyle = (COND_COLORS[c] || "#333") + "26";
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          const yy = pad.t + plotH - ((vals[j] + sems[j] - vMin) / (vMax - vMin)) * plotH;
          if (j === 0) ctx.moveTo(pts[j].x, yy);
          else ctx.lineTo(pts[j].x, yy);
        }
        for (let j = pts.length - 1; j >= 0; j--) {
          const yy = pad.t + plotH - ((vals[j] - sems[j] - vMin) / (vMax - vMin)) * plotH;
          ctx.lineTo(pts[j].x, yy);
        }
        ctx.closePath();
        ctx.fill();
      }
      ctx.strokeStyle = COND_COLORS[c] || "#333";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let j = 1; j < pts.length; j++) ctx.lineTo(pts[j].x, pts[j].y);
      ctx.stroke();
    });

    ctx.fillStyle = "#6e6e73";
    ctx.font = "11px -apple-system, sans-serif";
    ctx.textAlign = "center";
    const step = (tMax - tMin) <= 1 ? 0.2 : 0.5;
    for (let t = Math.ceil(tMin * 10) / 10; t <= tMax; t += step) {
      const x = pad.l + ((t - tMin) / (tMax - tMin)) * plotW;
      ctx.fillText(t.toFixed(1), x, height - pad.b + 18);
    }
    drawYAxisTicksAndLabel(ctx, pad, plotH, vMin, vMax, "Amplitude (a.u.)", 2);
    ctx.textAlign = "center";
    ctx.fillText("Time (s)", pad.l + plotW / 2, height - 12);
  }

  function drawGazeMetric(ctx, width, height, data, task) {
    if (!data || !data.conditions || !data.means) return;
    const conds = data.conditions;
    const pad = { t: 24, r: 18, b: 62, l: 62 };
    const plotW = width - pad.l - pad.r;
    const plotH = height - pad.t - pad.b;
    const n = conds.length;
    const colW = plotW / (n + 1);
    const allVals = [];
    if (Array.isArray(data.means)) allVals.push(...data.means);
    if (data.individual_subject_means) {
      conds.forEach(c => {
        if (Array.isArray(data.individual_subject_means[c])) allVals.push(...data.individual_subject_means[c]);
      });
    }
    let vMin = Math.min(...allVals.filter(v => Number.isFinite(v)));
    let vMax = Math.max(...allVals.filter(v => Number.isFinite(v)));
    if (!Number.isFinite(vMin) || !Number.isFinite(vMax) || vMax <= vMin) {
      vMin = 0;
      vMax = 1;
    }
    const span = vMax - vMin;
    vMin -= span * 0.08;
    vMax += span * 0.08;

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, width, height);

    ctx.strokeStyle = "#c7c7cc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, pad.t);
    ctx.lineTo(pad.l, height - pad.b);
    ctx.lineTo(width - pad.r, height - pad.b);
    ctx.stroke();

    ctx.fillStyle = "#6e6e73";
    ctx.font = "11px -apple-system, sans-serif";
    ctx.textAlign = "center";
    conds.forEach((c, i) => ctx.fillText(getCondLabel(c), pad.l + colW * (i + 1), height - pad.b + 18));
    drawYAxisTicksAndLabel(ctx, pad, plotH, vMin, vMax, "Value", 2);
    ctx.textAlign = "center";
    ctx.fillText("Condition", pad.l + plotW / 2, height - 12);

    conds.forEach((c, i) => {
      const x = pad.l + colW * (i + 1);
      const m = data.means[i];
      const s = (data.sds && data.sds[i]) || 0;
      const y0 = pad.t + plotH - ((m - vMin) / (vMax - vMin)) * plotH;
      const h = (s / (vMax - vMin)) * plotH;
      ctx.fillStyle = (COND_COLORS[c] || "#333") + "30";
      ctx.fillRect(x - 12, y0 - h / 2, 24, h);
      ctx.strokeStyle = "#1d1d1f";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x - 12, y0);
      ctx.lineTo(x + 12, y0);
      ctx.stroke();
      if (data.individual_subject_means && data.individual_subject_means[c]) {
        data.individual_subject_means[c].forEach((v, j) => {
          const yy = pad.t + plotH - ((v - vMin) / (vMax - vMin)) * plotH;
          const jx = x + deterministicJitter(j, i, 16);
          ctx.fillStyle = (COND_COLORS[c] || "#333") + "99";
          ctx.beginPath();
          ctx.arc(jx, yy, 3, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    });
  }

  function drawPlaceholder(ctx, width, height, msg) {
    ctx.fillStyle = "#fafafa";
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = "#6e6e73";
    ctx.font = "14px -apple-system, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(msg || "data not yet available", width / 2, height / 2);
  }

  function drawBehavior(ctx, width, height, data, task) {
    if (!data || !data.conditions) return;
    const conds = data.conditions;
    if (!conds || conds.length === 0) return;
    const accByCond = (data.individual_subject_means && data.individual_subject_means.accuracy) ? data.individual_subject_means.accuracy : {};
    const rtByCond = (data.individual_subject_means && data.individual_subject_means.reaction_time) ? data.individual_subject_means.reaction_time : {};
    const pad = { t: 30, r: 20, b: 68, l: 62 };
    const gap = 28;
    const split = Math.floor((height - pad.t - pad.b - gap) / 2);
    const topY = pad.t;
    const botY = pad.t + split + gap;
    const plotW = width - pad.l - pad.r;
    const n = conds.length;
    const step = plotW / Math.max(n + 1, 2);

    function drawSeries(y0, plotH, byCond, fallbackMeans, label) {
      const seriesVals = conds.flatMap(c => Array.isArray(byCond[c]) ? byCond[c] : []);
      const fallbackVals = (fallbackMeans || []).filter(v => Number.isFinite(v));
      const baseVals = seriesVals.length > 0 ? seriesVals : fallbackVals;
      if (!baseVals || baseVals.length === 0) return;

      let vMin = Math.min(...baseVals);
      let vMax = Math.max(...baseVals);
      if (label === "Accuracy") vMin = Math.min(0.4, vMin);
      if (vMax <= vMin) vMax = vMin + 1;
      const span = vMax - vMin;
      vMin -= span * 0.08;
      vMax += span * 0.08;

      ctx.strokeStyle = "#c7c7cc";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.l, y0);
      ctx.lineTo(pad.l, y0 + plotH);
      ctx.lineTo(width - pad.r, y0 + plotH);
      ctx.stroke();

      const localPad = { t: y0, l: pad.l };
      drawYAxisTicksAndLabel(ctx, localPad, plotH, vMin, vMax, "", 2);

      conds.forEach((c, condIdx) => {
        const x = pad.l + (condIdx + 1) * step;
        const values = Array.isArray(byCond[c]) ? byCond[c].filter(v => Number.isFinite(v)).slice().sort((a, b) => a - b) : [];
        if (values.length === 0) return;

        const q1 = quantile(values, 0.25);
        const q2 = quantile(values, 0.5);
        const q3 = quantile(values, 0.75);
        const low = values[0];
        const high = values[values.length - 1];
        const boxTop = y0 + plotH - ((q3 - vMin) / (vMax - vMin)) * plotH;
        const boxBot = y0 + plotH - ((q1 - vMin) / (vMax - vMin)) * plotH;
        const medY = y0 + plotH - ((q2 - vMin) / (vMax - vMin)) * plotH;
        const lowY = y0 + plotH - ((low - vMin) / (vMax - vMin)) * plotH;
        const highY = y0 + plotH - ((high - vMin) / (vMax - vMin)) * plotH;
        const color = COND_COLORS[c] || "#333";

        ctx.strokeStyle = color;
        ctx.fillStyle = color + "42";
        ctx.lineWidth = 1.2;
        ctx.fillRect(x - 13, boxTop, 26, Math.max(1, boxBot - boxTop));
        ctx.strokeRect(x - 13, boxTop, 26, Math.max(1, boxBot - boxTop));
        ctx.beginPath();
        ctx.moveTo(x, highY);
        ctx.lineTo(x, boxTop);
        ctx.moveTo(x, boxBot);
        ctx.lineTo(x, lowY);
        ctx.moveTo(x - 6, highY);
        ctx.lineTo(x + 6, highY);
        ctx.moveTo(x - 6, lowY);
        ctx.lineTo(x + 6, lowY);
        ctx.stroke();
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(x - 12, medY);
        ctx.lineTo(x + 12, medY);
        ctx.stroke();

        values.forEach((v, pointIdx) => {
          const yy = y0 + plotH - ((v - vMin) / (vMax - vMin)) * plotH;
          const xx = x + deterministicJitter(pointIdx, condIdx, 20);
          ctx.fillStyle = color + "8A";
          ctx.beginPath();
          ctx.arc(xx, yy, 2.4, 0, Math.PI * 2);
          ctx.fill();
        });
      });

      ctx.fillStyle = "#4b5563";
      ctx.font = "11px -apple-system, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(label, pad.l, y0 - 10);
      ctx.save();
      ctx.fillStyle = "#6e6e73";
      ctx.font = "10px -apple-system, sans-serif";
      ctx.textAlign = "center";
      ctx.translate(16, y0 + plotH / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(label === "Accuracy" ? "Accuracy" : "Reaction Time (s)", 0, 0);
      ctx.restore();
    }

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, width, height);
    drawSeries(topY, split, accByCond, data.accuracy_mean || [], "Accuracy");
    drawSeries(botY, split, rtByCond, data.reaction_time_mean || [], "Reaction Time (s)");

    ctx.fillStyle = "#6e6e73";
    ctx.font = "11px -apple-system, sans-serif";
    ctx.textAlign = "center";
    for (let i = 0; i < conds.length; i++) {
      const x = pad.l + (i + 1) * step;
      ctx.fillText(getCondLabel(conds[i]), x, height - pad.b + 18);
    }
    ctx.fillText("Condition", pad.l + plotW / 2, height - 12);
  }

  async function render() {
    if (renderAbortController) renderAbortController.abort();
    renderAbortController = new AbortController();
    const signal = renderAbortController.signal;

    updateVizAvailability();
    syncPillClasses();

    const container = document.getElementById("viz-content");
    container.innerHTML = "";
    const selectedViz = [...state.viz];
    const selectedTask = [...state.task];
    const procsOrdered = PROC_ORDER.filter(p => state.proc.has(p));
    if (selectedViz.length === 0 || selectedTask.length === 0 || procsOrdered.length === 0) return;

    for (const viz of VIZ_ORDER) {
      if (!selectedViz.includes(viz)) continue;
      const isGaze = !EEG_VIZ.includes(viz);
      const block = document.createElement("div");
      block.className = "aoc-viz-block " + (isGaze ? "gaze-viz" : "eeg-viz");
      const title = document.createElement("div");
      title.className = "aoc-viz-title";
      title.textContent = viz.replace(/_/g, " ").replace(/\b\w/g, l => l.toUpperCase());
      block.appendChild(title);
      const panels = document.createElement("div");
      panels.className = "aoc-panels" + (selectedTask.length > 1 ? " two-cols" : "");
      block.appendChild(panels);
      container.appendChild(block);

      for (const task of selectedTask) {
        const panel = document.createElement("div");
        panel.className = "aoc-panel";
        const panelTitle = document.createElement("div");
        panelTitle.className = "aoc-panel-title";
        panelTitle.textContent = TASK_LABELS[task];
        panel.appendChild(panelTitle);

        const procLoop = viz === "behavior" ? ["raw"] : procsOrdered;
        for (const proc of procLoop) {
          const procBlock = document.createElement("div");
          const procLabel = document.createElement("div");
          procLabel.className = "aoc-proc-label";
          procLabel.textContent = viz === "behavior" ? "Raw (trial-level)" : (PROC_LABELS[proc] || proc);
          procBlock.appendChild(procLabel);

          const wrap = document.createElement("div");
          wrap.className = "aoc-canvas-wrap" + (["spectrum", "erp", "tfr", "topo"].includes(viz) ? " tall" : "");
          const spinner = document.createElement("div");
          spinner.className = "aoc-spinner";
          wrap.appendChild(spinner);
          procBlock.appendChild(wrap);
          panel.appendChild(procBlock);

          if (!comboHasFile(viz, proc, task)) {
            spinner.remove();
            const canvas = document.createElement("canvas");
            const dpr = window.devicePixelRatio || 1;
            const rect = wrap.getBoundingClientRect();
            const w = rect.width || 400;
            const h = rect.height || 340;
            canvas.width = Math.round(w * dpr);
            canvas.height = Math.round(h * dpr);
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            wrap.appendChild(canvas);
            const ctx = canvas.getContext("2d");
            ctx.scale(dpr, dpr);
            drawPlaceholder(ctx, canvas.width / dpr, canvas.height / dpr, "not exported for this selection");
            continue;
          }

          loadData(viz, proc, task, signal).then(data => {
            if (signal.aborted) return;
            spinner.remove();
            const canvas = document.createElement("canvas");
            const dpr = window.devicePixelRatio || 1;
            const rect = wrap.getBoundingClientRect();
            const w = rect.width || 400;
            const h = rect.height || 340;
            canvas.width = Math.round(w * dpr);
            canvas.height = Math.round(h * dpr);
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            wrap.appendChild(canvas);
            const ctx = canvas.getContext("2d");
            ctx.scale(dpr, dpr);
            const cw = canvas.width / dpr, ch = canvas.height / dpr;
            if (!data) drawPlaceholder(ctx, cw, ch, "data not yet available");
            else if (viz === "spectrum") drawSpectrum(ctx, cw, ch, data, task);
            else if (viz === "erp") drawERP(ctx, cw, ch, data, task);
            else if (["gaze_deviation", "spl", "gaze_velocity", "bcea"].includes(viz)) drawGazeMetric(ctx, cw, ch, data, task);
            else if (viz === "behavior") drawBehavior(ctx, cw, ch, data, task);
            else drawPlaceholder(ctx, cw, ch, "TFR / Topography coming soon");
            if (data && data.conditions && ["spectrum", "erp"].includes(viz)) {
              const leg = document.createElement("div");
              leg.className = "aoc-legend";
              getCondNames(task).filter(c => data.conditions[c]).forEach(c => {
                const s = document.createElement("span");
                s.innerHTML = '<dot style="background:' + (COND_COLORS[c] || "#333") + '"></dot> ' + getCondLabel(c);
                leg.appendChild(s);
              });
              procBlock.appendChild(leg);
            }
          }).catch(function (e) {
            if (e && e.name === "AbortError") return;
          });
        }
        panels.appendChild(panel);
      }
    }
  }

  document.querySelectorAll("#viz-pills .aoc-pill").forEach(p => {
    p.addEventListener("click", () => {
      if (p.disabled) return;
      const v = p.dataset.viz;
      if (state.viz.has(v)) state.viz.delete(v);
      else state.viz.add(v);
      syncPillClasses();
      updateProcVisibility();
      render();
    });
  });

  document.querySelectorAll("#proc-pills .aoc-pill").forEach(p => {
    p.addEventListener("click", () => {
      if (p.disabled) return;
      const pr = p.dataset.proc;
      if (state.proc.has(pr)) {
        if (state.proc.size > 1) state.proc.delete(pr);
      } else {
        state.proc.add(pr);
      }
      syncPillClasses();
      render();
    });
  });

  document.querySelectorAll("#task-pills .aoc-pill").forEach(p => {
    p.addEventListener("click", () => {
      if (p.disabled) return;
      const t = p.dataset.task;
      if (state.task.has(t)) state.task.delete(t);
      else state.task.add(t);
      syncPillClasses();
      updateProcVisibility();
      render();
    });
  });

  const runtimeNote = document.getElementById("aoc-runtime-note");
  if (window.location.protocol === "file:") {
    runtimeNote.style.display = "";
    runtimeNote.textContent = "Local file mode detected. Load this page via a local web server (e.g., python3 -m http.server) to enable data loading.";
  }
  fetch(DATA_BASE + "data_manifest.json")
    .then(r => r.ok ? r.json() : null)
    .then(man => {
      if (man && Array.isArray(man.files)) availableFiles = new Set(man.files);
    })
    .catch(() => {})
    .finally(() => {
      syncPillClasses();
      updateProcVisibility();
      render();
    });

  const FIGS_BASE = "resources/AOC/figures/";
  function openLightbox(url, isPdf) {
    const lb = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    const pdf = document.getElementById("lightbox-pdf");
    if (isPdf) {
      img.style.display = "none";
      pdf.style.display = "block";
      pdf.src = url;
    } else {
      pdf.style.display = "none";
      pdf.src = "";
      img.style.display = "block";
      img.src = url;
    }
    lb.classList.add("open");
  }
  function closeLightbox() {
    const lb = document.getElementById("lightbox");
    lb.classList.remove("open");
    document.getElementById("lightbox-pdf").src = "";
  }
  fetch(FIGS_BASE + "manifest.json").then(r => r.ok ? r.json() : []).then(manifest => {
    const grid = document.getElementById("multiverse-grid");
    (manifest || []).filter(m => m.section === "multiverse").forEach(m => {
      const url = FIGS_BASE + m.file;
      const isPdf = /\.pdf$/i.test(m.file || "");
      const a = document.createElement("a");
      a.href = "#";
      a.className = "aoc-fig-item";
      const thumb = isPdf
        ? '<iframe class="aoc-fig-pdf" loading="lazy" src="' + url + '" title=""></iframe>'
        : '<img loading="lazy" src="' + url + '" alt="">';
      a.innerHTML = thumb + '<div class="aoc-fig-caption">' + (m.caption || "") + "</div>";
      a.addEventListener("click", function (e) {
        e.preventDefault();
        openLightbox(url, isPdf);
      });
      grid.appendChild(a);
    });
  }).catch(() => {});

  document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
  document.getElementById("lightbox").addEventListener("click", e => { if (e.target === e.currentTarget) closeLightbox(); });

  new ResizeObserver(() => render()).observe(document.getElementById("viz-card"));
})();
  </script>
