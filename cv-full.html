<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CV_Arne_Hansen_long</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .print-bar { position: sticky; top: 0; z-index: 300; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .print-bar-label { font-size: 0.78rem; color: var(--muted); }
    .print-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .cv-header { padding: 2rem 0 1.5rem; border-bottom: 2px solid var(--border); margin-bottom: 1rem; }
    .cv-header h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .cv-subtitle { font-size: 0.88rem; color: var(--muted); margin-bottom: 0.75rem; }
    .cv-contacts { font-size: 0.8rem; margin-bottom: 0.75rem; line-height: 1.8; }
    .cv-icon-links { display: flex; flex-wrap: wrap; gap: 14px; }
    .cv-icon-links .icon-link { opacity: 0.7; }
    @media print {
      .print-bar, .nav, .site-footer { display: none !important; }
      @page { margin: 14mm 18mm; size: A4; }
      .container { max-width: 100% !important; padding: 0 !important; }
      .sh-icon, .tl-line-col, .tl-tag, .os-badges { display: none !important; }
      .tl-row { grid-template-columns: 72pt 1fr; page-break-inside: avoid; }
      .tl-content { padding-left: 6pt; padding-bottom: 12pt; }
      .section-heading { page-break-after: avoid; }
      .pub-entry, .award-entry, .pres-entry, .member-entry, .outreach-entry { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="print-bar">
    <span class="print-bar-label"><strong>Full CV</strong> · Automatically generated from website pages.</span>
    <button class="print-btn" onclick="downloadFullPDF()">Download PDF</button>
  </div>

  <div class="container">
    <div class="cv-header">
      <h1 id="cv-name">Arne D. Hansen</h1>
      <div class="cv-subtitle" id="cv-subtitle"></div>
      <div class="cv-contacts" id="cv-contacts"></div>
      <div class="cv-icon-links profile-icon-links" id="cv-links"></div>
    </div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3 1 9l11 6 9-4.91V17h2V9L12 3z"/></svg></span>Education</div>
    <div class="timeline" id="cv-education"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg></span>Professional Experience</div>
    <div class="timeline" id="cv-experience"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8v-2zm0-4h8v2H8v-2z"/></svg></span>Publications</div>
    <div id="cv-publications"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M18 11v2h4v-2h-4zm-2 6.61c.96.71 2.21 1.65 3.2 2.39.4-.53.8-1.07 1.2-1.6-.99-.74-2.24-1.68-3.2-2.4-.4.54-.8 1.08-1.2 1.61zM20.4 5.6c-.4-.53-.8-1.07-1.2-1.6-.99.74-2.24 1.68-3.2 2.4.4.53.8 1.07 1.2 1.6.96-.72 2.21-1.65 3.2-2.4zM4 9c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1v4h2v-4h1l5 3V6L8 9H4zm11.5 3c0-1.33-.58-2.53-1.5-3.35v6.69c.92-.81 1.5-2.01 1.5-3.34z"/></svg></span>Science Outreach</div>
    <div id="cv-outreach-intro"></div>
    <div id="cv-outreach"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1a5.002 5.002 0 0 0 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg></span>Awards</div>
    <div id="cv-awards"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M9.68 13.69 12 11.93l2.31 1.76-.88-2.85L15.75 9h-2.84L12 6.19 11.09 9H8.25l2.31 1.84-.88 2.85zM20 10c0-4.42-3.58-8-8-8s-8 3.58-8 8c0 2.96 1.64 5.54 4.06 6.93-.07.36-.06.83.19 1.32l1.5 2.83c.38.71 1.12 1.12 1.87 1.12h.75c.75 0 1.49-.41 1.87-1.12l1.5-2.83c.25-.49.26-.96.19-1.32C18.36 15.54 20 12.96 20 10z"/></svg></span>Grants</div>
    <div id="cv-grants"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 17.93V20h-2v-.07A8.001 8.001 0 0 1 4.07 13H4v-2h.07A8.001 8.001 0 0 1 11 4.07V4h2v.07A8.001 8.001 0 0 1 19.93 11H20v2h-.07A8.001 8.001 0 0 1 13 19.93z"/></svg></span>Skills</div>
    <div id="cv-skills"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1z"/></svg></span>Advanced Training & Workshops</div>
    <div id="cv-workshops"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M15 11V5l-3-3-3 3v2H3v14h18V11h-6z"/></svg></span>Institutional Activities</div>
    <div id="cv-institutional"></div>

    <div class="section-heading"><span class="sh-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></span>Extracurricular Activities</div>
    <div id="cv-extracurricular"></div>

  </div>

  <footer class="site-footer">Last updated March 2026</footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="cv-builder.js"></script>
  <script>
    async function downloadFullPDF() {
      const element = document.querySelector(".container");
      if (!element || !window.html2pdf) {
        window.print();
        return;
      }
      const options = {
        margin: [10, 10, 10, 10],
        filename: "CV_Arne_Hansen_long.pdf",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: "#ffffff" },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
        pagebreak: { mode: ["css", "legacy"] }
      };
      await window.html2pdf().set(options).from(element).save();
    }

    async function renderFullCV() {
      try {
        const [profile, sections] = await Promise.all([CVBuilder.loadProfile(), CVBuilder.loadAllSections()]);
        document.getElementById("cv-name").textContent = profile.name;
        document.getElementById("cv-subtitle").innerHTML = profile.subtitle;
        document.getElementById("cv-contacts").innerHTML = profile.contacts;
        document.getElementById("cv-links").innerHTML = profile.links;
        CVBuilder.renderInto(document.getElementById("cv-education"), sections.educationRows);
        CVBuilder.renderInto(document.getElementById("cv-experience"), sections.experienceRows);
        CVBuilder.renderInto(document.getElementById("cv-publications"), sections.publicationSections);
        if (sections.outreachIntro) {
          document.getElementById("cv-outreach-intro").appendChild(sections.outreachIntro);
        }
        CVBuilder.renderInto(document.getElementById("cv-outreach"), sections.outreachEntries);
        CVBuilder.renderInto(document.getElementById("cv-awards"), sections.awardsEntries);
        CVBuilder.renderInto(document.getElementById("cv-grants"), sections.grantsEntries);
        if (sections.skillsGrid) {
          document.getElementById("cv-skills").appendChild(sections.skillsGrid);
        }
        CVBuilder.renderInto(document.getElementById("cv-workshops"), sections.workshopsEntries);
        CVBuilder.renderInto(document.getElementById("cv-institutional"), sections.institutionalEntries);
        CVBuilder.renderInto(document.getElementById("cv-extracurricular"), sections.extracurricularEntries);
      } catch (error) {
        console.error("Full CV rendering failed:", error);
        const contacts = document.getElementById("cv-contacts");
        if (contacts) {
          contacts.innerHTML = "Unable to load CV sections. Open this page via a local web server or on the deployed site.";
        }
      }
    }
    renderFullCV();
  </script>
</body>
</html>
